server:
  port: 8087
  servlet:
    context-path: /api/ms-jobs

spring:
  application:
    name: ms.jobs
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:ms_jobs}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  sql:
    init:
      mode: never
    jpa:
      hibernate:
        ddl-auto: update
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
      properties:
        org:
          quartz:
            scheduler:
              instanceName: MyQuartzScheduler
              instanceId: AUTO

