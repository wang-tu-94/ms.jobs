server:
  port: 8087
  servlet:
    context-path: /api/ms-jobs

spring:
  application:
    name: ms.jobs
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:ms_jobs}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  sql:
    init:
      mode: never
    jpa:
      hibernate:
        ddl-auto: update
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
      properties:
        org:
          quartz:
            scheduler:
              instanceName: MyQuartzScheduler
              instanceId: AUTO
springdoc:
  api-doc:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:8w9eK7sVh3FQ2mJ6lP0rXyZtN1bQ4uDkFvHsT2cW+Eo=}
