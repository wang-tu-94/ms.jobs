server:
  port: 8087
  servlet:
    context-path: /api/ms-jobs

spring:
  jackson:
    datatype:
      datetime:
        write-dates-as-timestamps: true
        write-date-timestamps-as-nanoseconds: false
        read-date-timestamps-as-nanoseconds: false
  application:
    name: ms.jobs
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:ms_jobs}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    jpa:
      hibernate:
        ddl-auto: update
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    properties:
      org:
        quartz:
          scheduler:
            instanceName: MyQuartzScheduler
            instanceId: AUTO
          jobStore:
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            useProperties: true
            tablePrefix: QRTZ_
springdoc:
  api-doc:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        # On expose health pour le monitoring et info/metrics pour le debug
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized # Détails (DB, Quartz) uniquement si logué
  health:
    quartz:
      enabled: true # Active l'indicateur spécifique à Quartz

jwt:
  secret: ${JWT_SECRET:8w9eK7sVh3FQ2mJ6lP0rXyZtN1bQ4uDkFvHsT2cW+Eo=}
