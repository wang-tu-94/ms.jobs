services:
  db:
    image: postgres:16-alpine
    container_name: ms-jobs-db
    environment:
      POSTGRES_DB: ${DB_NAME:-ms_jobs}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-ms_jobs}"]
      interval: 5s
      timeout: 5s
      retries: 5